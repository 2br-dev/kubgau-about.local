<div class="swiper-slide">

		<div class="col l5 m6 s12 order-m1">
			<div class="faculty-logo"><img src="./tulip-2026/img/logo-@@faculty.svg" alt=""></div>
			@@if(id==1){
				<h2>Сетевые программы</h2>
			}
			@@if(id!=1){
				<span class="h2">Сетевые программы</span>
			}

			<a href="@@link" class="bttn" target="_blank" rel="nofollow">Подробнее</a>
		</div>
		<div class="col m6 s12 offset-l1">

	</div>
